// --- Sparkline mini chart ---
function Sparkline({ data, color, width = 120, height = 40 }) {
  if (!data || data.length < 2) return <span style={{color:'var(--text-muted)', fontFamily:'var(--font-mono)', fontSize:11}}>No data</span>;
  return (
    <ResponsiveContainer width={width} height={height}>
      <AreaChart data={data} margin={{top:2,right:2,bottom:2,left:2}}>
        <defs>
          <linearGradient id={`grad-${color.replace(/[^a-z0-9]/gi,'')}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity={0.3}/>
            <stop offset="100%" stopColor={color} stopOpacity={0.02}/>
          </linearGradient>
        </defs>
        <Area type="monotone" dataKey="value" stroke={color} strokeWidth={1.5}
              fill={`url(#grad-${color.replace(/[^a-z0-9]/gi,'')})`} dot={false} />
      </AreaChart>
    </ResponsiveContainer>
  );
}

// --- Full chart for comparison view ---
function ComparisonChart({ metric, dataByCountry }) {
  // Merge all country data onto shared date axis
  const allDates = new Set();
  Object.values(dataByCountry).forEach(arr =>
    (arr || []).forEach(d => allDates.add(d.date))
  );
  const sortedDates = [...allDates].sort();

  const merged = sortedDates.map(date => {
    const row = { date };
    Object.entries(dataByCountry).forEach(([country, arr]) => {
      const match = (arr || []).find(d => d.date === date);
      if (match) row[country] = Math.round(match.value * 100) / 100;
    });
    return row;
  });

  // Thin out data for readability
  const step = Math.max(1, Math.floor(merged.length / 60));
  const thinned = merged.filter((_, i) => i % step === 0 || i === merged.length - 1);

  const formatDate = (d) => {
    if (!d) return '';
    const parts = d.split('-');
    return `${parts[0].slice(2)}/${parts[1]}`;
  };

  return (
    <div style={{width:'100%', height:300}}>
      <ResponsiveContainer>
        <LineChart data={thinned} margin={{top:10,right:20,bottom:5,left:10}}>
          <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" />
          <XAxis dataKey="date" tickFormatter={formatDate} tick={{fill:'var(--text-muted)', fontSize:11, fontFamily:'var(--font-mono)'}} interval="preserveStartEnd" />
          <YAxis tick={{fill:'var(--text-muted)', fontSize:11, fontFamily:'var(--font-mono)'}} width={50} />
          <Tooltip
            contentStyle={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8,fontFamily:'var(--font-mono)',fontSize:12}}
            labelStyle={{color:'var(--text-secondary)'}}
          />
          {Object.keys(COUNTRY_META).map(c => (
            <Line key={c} type="monotone" dataKey={c}
                  stroke={COUNTRY_META[c].accent} strokeWidth={2} dot={false}
                  name={COUNTRY_META[c].name} connectNulls />
          ))}
          <Legend wrapperStyle={{fontFamily:'var(--font-sans)', fontSize:13}} />
        </LineChart>
      </ResponsiveContainer>
    </div>
  );
}

// --- Metric Card ---
function MetricCard({ label, value, unit, data, color, description, trend }) {
  const trendColor = trend > 0 ? 'var(--accent-green)' : trend < 0 ? 'var(--accent-red)' : 'var(--text-muted)';
  const trendArrow = trend > 0 ? '↑' : trend < 0 ? '↓' : '→';

  return (
    <div style={{
      background: 'var(--bg-card)',
      border: '1px solid var(--border)',
      borderRadius: 'var(--radius)',
      padding: '16px 18px',
      display: 'flex',
      flexDirection: 'column',
      gap: 8,
      transition: 'border-color 0.2s, background 0.2s',
      cursor: 'default',
    }}
    onMouseEnter={e => { e.currentTarget.style.borderColor = color; e.currentTarget.style.background = 'var(--bg-card-hover)'; }}
    onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.background = 'var(--bg-card)'; }}
    >
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
        <div>
          <div style={{fontSize:12, color:'var(--text-secondary)', fontWeight:500, textTransform:'uppercase', letterSpacing:'0.5px'}}>{label}</div>
          <div style={{fontSize:26, fontFamily:'var(--font-mono)', fontWeight:600, marginTop:4, color: value !== null ? 'var(--text-primary)' : 'var(--text-muted)'}}>
            {value !== null ? `${value.toLocaleString(undefined, {maximumFractionDigits:1})}` : '—'}
            <span style={{fontSize:13, fontWeight:400, color:'var(--text-muted)', marginLeft:4}}>{unit}</span>
          </div>
        </div>
        <Sparkline data={data} color={color} />
      </div>
      {trend !== null && (
        <div style={{fontSize:12, fontFamily:'var(--font-mono)', color: trendColor}}>
          {trendArrow} {Math.abs(trend).toFixed(1)} vs prior
        </div>
      )}
      <div style={{fontSize:11, color:'var(--text-muted)', marginTop:2}}>{description}</div>
    </div>
  );
}

// --- Country Dashboard Panel ---
function CountryPanel({ country, fredData, wbData, loading }) {
  const meta = COUNTRY_META[country];
  if (loading) {
    return (
      <div style={{textAlign:'center', padding:'60px 0'}}>
        <div className="loading-pulse" style={{fontSize:18, color:'var(--text-secondary)'}}>Loading {meta.name} data...</div>
      </div>
    );
  }

  // Build metric cards from whatever data we have
  const cards = DASHBOARD_METRICS.map(m => {
    const fd = fredData[m.key] || [];
    const wb = wbData[m.key] || [];
    const data = fd.length > 0 ? fd : wb;
    const latest = data.length > 0 ? data[data.length - 1].value : null;
    const prev = data.length > 1 ? data[data.length - 2].value : null;
    const trend = (latest !== null && prev !== null) ? latest - prev : null;
    return (
      <MetricCard
        key={m.key}
        label={m.label}
        value={latest}
        unit={m.unit}
        data={data.slice(-36)}
        color={meta.accent}
        description={m.description}
        trend={trend}
      />
    );
  });

  return (
    <div>
      <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:20}}>
        <span style={{fontSize:32}}>{meta.flag}</span>
        <div>
          <h2 style={{fontSize:22, fontWeight:600, margin:0}}>{meta.name}</h2>
          <span style={{fontSize:13, color:'var(--text-secondary)'}}>Economic Dashboard</span>
        </div>
      </div>
      <div style={{
        display: 'grid',
        gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))',
        gap: 14,
      }}>
        {cards}
      </div>
    </div>
  );
}

    <div style={{maxWidth:1280, margin:'0 auto', padding:'20px 24px 60px'}}>
      {/* Header */}
      <header style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24, paddingBottom:16, borderBottom:'1px solid var(--border)'}}>
        <div>
          <h1 style={{fontSize:22, fontWeight:700, letterSpacing:'-0.3px', margin:0}}>Global Economics Dashboard</h1>
          <span style={{fontSize:12, color:'var(--text-muted)'}}>EMBA BA 6239 · Spring 2026 · Data as of March 2026</span>
        </div>
        <div style={{fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)'}}>
          Sources: BEA, BLS, FRED, INDEC, NBS, IMF, World Bank
        </div>
      </header>

      {/* Navigation */}
      <nav style={{display:'flex', gap:4, marginBottom:28, flexWrap:'wrap'}}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setView(t.id)}
            style={{
              padding:'8px 16px', fontSize:13, fontWeight: view === t.id ? 600 : 400,
              background: view === t.id ? 'var(--bg-card-hover)' : 'transparent',
              color: view === t.id ? 'var(--text-primary)' : 'var(--text-secondary)',
              border: view === t.id ? '1px solid var(--border)' : '1px solid transparent',
              borderRadius: 6, cursor:'pointer', transition:'all 0.2s',
              fontFamily:'var(--font-sans)',
            }}
          >
            {t.label}
          </button>
        ))}
      </nav>

      {/* Overview */}
      {view === 'overview' && (
        <div>
          <h2 style={{fontSize:18, fontWeight:600, marginBottom:16}}>Three-Economy Snapshot</h2>
          <p style={{fontSize:14, color:'var(--text-secondary)', marginBottom:24, maxWidth:700}}>
            Key metrics at a glance. Click a country tab for the full dashboard or Compare to overlay trends.
          </p>

          {/* Summary table */}
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%', borderCollapse:'collapse', fontFamily:'var(--font-mono)', fontSize:13}}>
              <thead>
                <tr style={{borderBottom:'2px solid var(--border)'}}>
                  <th style={{textAlign:'left', padding:'10px 12px', color:'var(--text-secondary)', fontWeight:500, fontFamily:'var(--font-sans)', fontSize:12, textTransform:'uppercase', letterSpacing:'0.5px'}}>Metric</th>
                  {Object.entries(COUNTRY_META).map(([k,v]) => (
                    <th key={k} style={{textAlign:'right', padding:'10px 12px', color:v.accent, fontWeight:600, fontFamily:'var(--font-sans)', fontSize:13}}>
                      {v.flag} {v.short}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {DASHBOARD_METRICS.map((m, i) => {
                  const getLatest = (country) => {
                    const data = countryData[country]?.[m.key] || [];
                    return data.length > 0 ? data[data.length - 1].value : null;
                  };
                  return (
                    <tr key={m.key} style={{borderBottom:'1px solid var(--border)', background: i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.01)'}}>
                      <td style={{padding:'10px 12px', color:'var(--text-secondary)', fontFamily:'var(--font-sans)', fontSize:13}}>{m.label}</td>
                      {Object.keys(COUNTRY_META).map(c => {
                        const val = getLatest(c);
                        return (
                          <td key={c} style={{textAlign:'right', padding:'10px 12px', fontWeight:500, color: val !== null ? 'var(--text-primary)' : 'var(--text-muted)'}}>
                            {val !== null ? val.toLocaleString(undefined, {maximumFractionDigits:1}) : '—'}
                          </td>
                        );
                      })}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Country Deep Dives */}
      {['US','ARG','CHN'].includes(view) && (
        <CountryPanel
          country={view}
          fredData={countryData[view] || {}}
          wbData={{}}
          loading={false}
        />
      )}

      {/* Comparison View */}
      {view === 'compare' && (
        <div>
          <h2 style={{fontSize:18, fontWeight:600, marginBottom:8}}>Cross-Country Comparison</h2>
          <p style={{fontSize:14, color:'var(--text-secondary)', marginBottom:20}}>
            Select a metric to overlay all three economies on a single chart.
          </p>

          <div style={{display:'flex', flexWrap:'wrap', gap:6, marginBottom:24}}>
            {DASHBOARD_METRICS.map(m => (
              <button key={m.key} onClick={() => setCompareMetric(m.key)}
                style={{
                  padding:'6px 14px', fontSize:12, fontWeight: compareMetric === m.key ? 600 : 400,
                  background: compareMetric === m.key ? 'var(--accent-us)' : 'var(--bg-card)',
                  color: compareMetric === m.key ? '#fff' : 'var(--text-secondary)',
                  border: '1px solid ' + (compareMetric === m.key ? 'var(--accent-us)' : 'var(--border)'),
                  borderRadius: 20, cursor:'pointer', transition:'all 0.15s',
                  fontFamily:'var(--font-sans)',
                }}
              >
                {m.label}
              </button>
            ))}
          </div>

          {(() => {
            const m = DASHBOARD_METRICS.find(x => x.key === compareMetric);
            const dataByCountry = {};
            Object.keys(COUNTRY_META).forEach(c => {
              dataByCountry[c] = countryData[c]?.[compareMetric] || [];
            });
            return (
              <div style={{background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:'var(--radius)', padding:24}}>
                <h3 style={{fontSize:16, fontWeight:600, marginBottom:4}}>{m.label}</h3>
                <p style={{fontSize:12, color:'var(--text-muted)', marginBottom:16}}>{m.description} ({m.unit})</p>
                <ComparisonChart metric={compareMetric} dataByCountry={dataByCountry} />
              </div>
            );
          })()}


        </div>
      )}

      {/* Sources */}
      {view === 'sources' && (
        <div>
          <h2 style={{fontSize:18, fontWeight:600, marginBottom:8}}>Data Sources</h2>
          <p style={{fontSize:14, color:'var(--text-secondary)', marginBottom:24}}>
            All data current as of March 2026. Metrics use the most recent official release for each country.
          </p>

          {[
            { heading: "United States", color: "var(--accent-us)", items: [
              { metric: "Real GDP Growth", source: "Bureau of Economic Analysis (BEA)", detail: "GDP Second Estimate, Q4 2025 released Mar 13 2026", url: "https://www.bea.gov/data/gdp/gross-domestic-product" },
              { metric: "CPI Inflation", source: "Bureau of Labor Statistics (BLS)", detail: "Consumer Price Index, Feb 2026 released Mar 11 2026", url: "https://www.bls.gov/cpi/" },
              { metric: "Unemployment Rate", source: "Bureau of Labor Statistics (BLS)", detail: "Employment Situation, Feb 2026 released Mar 6 2026", url: "https://www.bls.gov/news.release/empsit.nr0.htm" },
              { metric: "Exchange Rate (USD Index)", source: "Federal Reserve (FRED)", detail: "Trade Weighted U.S. Dollar Index: Broad (DTWEXBGS)", url: "https://fred.stlouisfed.org/series/DTWEXBGS" },
              { metric: "Interest Rate", source: "Federal Reserve", detail: "Federal Funds Effective Rate, FOMC Mar 2026", url: "https://www.federalreserve.gov/monetarypolicy/openmarket.htm" },
            ]},
            { heading: "Argentina", color: "var(--accent-arg)", items: [
              { metric: "Real GDP Growth", source: "INDEC (Argentina)", detail: "Estimador Mensual de Actividad Economica, Q4 2025 released Mar 23 2026", url: "https://www.indec.gob.ar/indec/web/Nivel4-Tema-3-9-47" },
              { metric: "CPI Inflation", source: "INDEC (Argentina)", detail: "Indice de Precios al Consumidor, Feb 2026", url: "https://www.indec.gob.ar/indec/web/Nivel4-Tema-3-5-31" },
              { metric: "Unemployment Rate", source: "INDEC (Argentina)", detail: "Encuesta Permanente de Hogares, Q4 2025 released Mar 18 2026", url: "https://www.indec.gob.ar/indec/web/Nivel4-Tema-4-31-58" },
              { metric: "Exchange Rate (ARS/USD)", source: "BCRA / Trading Economics", detail: "Official exchange rate, daily", url: "https://www.bcra.gob.ar/PublicacionesEstadisticas/Principales_variables_datos.asp" },
              { metric: "Interest Rate", source: "Banco Central de la Republica Argentina", detail: "BCRA reference rate (overnight repo)", url: "https://www.bcra.gob.ar/PublicacionesEstadisticas/Principales_variables.asp" },
            ]},
            { heading: "China", color: "var(--accent-chn)", items: [
              { metric: "Real GDP Growth", source: "National Bureau of Statistics (NBS)", detail: "GDP Preliminary Estimate, Q4 2025 released Jan 19 2026", url: "https://www.stats.gov.cn/english/PressRelease/" },
              { metric: "CPI Inflation", source: "National Bureau of Statistics (NBS)", detail: "Consumer Price Index, Feb 2026", url: "https://www.stats.gov.cn/english/PressRelease/" },
              { metric: "Unemployment Rate", source: "National Bureau of Statistics (NBS)", detail: "Urban Surveyed Unemployment Rate, Jan-Feb 2026", url: "https://www.stats.gov.cn/english/PressRelease/" },
              { metric: "Exchange Rate (CNY/USD)", source: "Federal Reserve (FRED)", detail: "Chinese Yuan Renminbi to U.S. Dollar Spot Rate", url: "https://fred.stlouisfed.org/series/DEXCHUS" },
              { metric: "Interest Rate", source: "People's Bank of China", detail: "1-Year Loan Prime Rate (LPR), held Mar 20 2026", url: "http://www.pbc.gov.cn/en/3688006/index.html" },
            ]},
          ].map(section => (
            <div key={section.heading} style={{marginBottom:32}}>
              <h3 style={{fontSize:15, fontWeight:600, color:section.color, marginBottom:12}}>{section.heading}</h3>
              <div style={{display:'flex', flexDirection:'column', gap:1}}>
                {section.items.map((item, i) => (
                  <div key={i} style={{
                    display:'grid', gridTemplateColumns:'180px 1fr', gap:16,
                    padding:'10px 14px', background: i % 2 === 0 ? 'var(--bg-card)' : 'transparent',
                    borderRadius:6, fontSize:13,
                  }}>
                    <div style={{fontWeight:500, color:'var(--text-primary)'}}>{item.metric}</div>
                    <div>
                      <span style={{color:'var(--text-secondary)'}}>{item.source}</span>
                      <span style={{color:'var(--text-muted)', marginLeft:8}}>{item.detail}</span>
                      <a href={item.url} target="_blank" rel="noopener noreferrer"
                         style={{color:section.color, marginLeft:8, textDecoration:'none', fontSize:12}}>
                        Link ↗
                      </a>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Footer */}
      <footer style={{marginTop:48, paddingTop:20, borderTop:'1px solid var(--border)', fontSize:11, color:'var(--text-muted)', display:'flex', justifyContent:'space-between', flexWrap:'wrap', gap:8}}>
        <span>Sources: BEA · BLS · FRED · INDEC · NBS China · IMF · World Bank</span>
        <span>EMBA BA 6239 · Global Economics · Midterm Project · Spring 2026</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
