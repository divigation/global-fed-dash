<!DOCTYPE html>
<html lang="en">

<style>
  :root {
    /* FRED-inspired palette */
    --bg-primary: #ffffff;
    --bg-page: #f5f6f7;
    --bg-card: #ffffff;
    --bg-card-hover: #f4f7fb;
    --bg-stripe: #f9fafb;
    --bg-header: #0a3052;
    --bg-header-accent: #1f4e7a;
    --border: #d4d9e0;
    --border-strong: #b7c0cb;
    --text-primary: #1a1a1a;
    --text-secondary: #4a5568;
    --text-muted: #6b7785;
    --text-on-dark: #ffffff;
    --link: #2272b9;
    --link-hover: #0a3052;
    /* Country accents — FRED-style */
    --accent-us:  #2272b9; /* FRED blue */
    --accent-arg: #c8102e; /* red */
    --accent-chn: #2e8b57; /* sea green */
    --accent-green: #2e8b57;
    --accent-red: #c8102e;
    --accent-yellow: #d97706;
    --radius: 3px;
    --font-sans: 'Source Sans 3', 'Open Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-serif: 'Source Serif 4', Georgia, 'Times New Roman', serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--bg-page);
    color: var(--text-primary);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  #root { min-height: 100vh; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-page); }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

  /* FRED-style top brand bar */
  .fred-brandbar {
    background: var(--bg-header);
    color: var(--text-on-dark);
    border-bottom: 3px solid var(--accent-us);
  }
  .fred-brandbar-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .fred-brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .fred-brand-mark {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 24px;
    letter-spacing: -0.3px;
    color: var(--text-on-dark);
  }
  .fred-brand-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.72);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .fred-brandbar-meta {
    font-size: 11px;
    font-family: var(--font-mono);
    color: rgba(255,255,255,0.78);
    text-align: right;
  }

  /* Page container */
  .page-shell {
    background: var(--bg-primary);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    max-width: 1280px;
    margin: 0 auto;
    min-height: calc(100vh - 70px);
  }

  /* FRED nav tabs */
  .fred-nav {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg-primary);
    flex-wrap: wrap;
  }
  .fred-tab {
    padding: 12px 18px;
    font-size: 14px;
    font-family: var(--font-sans);
    font-weight: 500;
    color: var(--text-secondary);
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: -1px;
  }
  .fred-tab:hover {
    color: var(--link);
    background: var(--bg-card-hover);
  }
  .fred-tab.active {
    color: var(--bg-header);
    border-bottom-color: var(--accent-us);
    font-weight: 600;
    background: var(--bg-primary);
  }

  /* Headings — FRED uses serif for the big titles */
  h1.fred-title, h2.fred-title, h3.fred-title {
    font-family: var(--font-serif);
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.2px;
  }

  /* Links */
  a { color: var(--link); text-decoration: none; }
  a:hover { color: var(--link-hover); text-decoration: underline; }

  /* Table */
  .fred-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
  }
  .fred-table thead th {
    text-align: left;
    padding: 12px 16px;
    background: var(--bg-stripe);
    color: var(--text-primary);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    border-bottom: 2px solid var(--border-strong);
  }
  .fred-table tbody td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
  }
  .fred-table tbody tr:nth-child(even) td { background: var(--bg-stripe); }
  .fred-table tbody tr:last-child td { border-bottom: none; }

  /* Chip / pill buttons for compare metric selector */
  .fred-chip {
    padding: 7px 14px;
    font-size: 13px;
    font-family: var(--font-sans);
    font-weight: 500;
    color: var(--text-secondary);
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .fred-chip:hover {
    color: var(--link);
    border-color: var(--link);
  }
  .fred-chip.active {
    background: var(--accent-us);
    color: #fff;
    border-color: var(--accent-us);
    font-weight: 600;
  }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  .loading-pulse { animation: pulse 1.5s ease-in-out infinite; }
</style>
</head>

// --- Sparkline mini chart ---
function Sparkline({ data, color, width = 120, height = 40 }) {
  if (!data || data.length < 2) return <span style={{color:'var(--text-muted)', fontFamily:'var(--font-mono)', fontSize:11}}>No data</span>;
  return (
    <ResponsiveContainer width={width} height={height}>
      <AreaChart data={data} margin={{top:2,right:2,bottom:2,left:2}}>
        <defs>
          <linearGradient id={`grad-${color.replace(/[^a-z0-9]/gi,'')}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity={0.22}/>
            <stop offset="100%" stopColor={color} stopOpacity={0.02}/>
          </linearGradient>
        </defs>
        <Area type="monotone" dataKey="value" stroke={color} strokeWidth={1.75}
              fill={`url(#grad-${color.replace(/[^a-z0-9]/gi,'')})`} dot={false} />
      </AreaChart>
    </ResponsiveContainer>
  );
}

// --- Full chart for comparison view ---
function ComparisonChart({ metric, dataByCountry }) {
  // Merge all country data onto shared date axis
  const allDates = new Set();
  Object.values(dataByCountry).forEach(arr =>
    (arr || []).forEach(d => allDates.add(d.date))
  );
  const sortedDates = [...allDates].sort();

  const merged = sortedDates.map(date => {
    const row = { date };
    Object.entries(dataByCountry).forEach(([country, arr]) => {
      const match = (arr || []).find(d => d.date === date);
      if (match) row[country] = Math.round(match.value * 100) / 100;
    });
    return row;
  });

  // Thin out data for readability
  const step = Math.max(1, Math.floor(merged.length / 60));
  const thinned = merged.filter((_, i) => i % step === 0 || i === merged.length - 1);

  const formatDate = (d) => {
    if (!d) return '';
    const parts = d.split('-');
    return `${parts[0].slice(2)}/${parts[1]}`;
  };

  return (
    <div style={{width:'100%', height:300}}>
      <ResponsiveContainer>
        <LineChart data={thinned} margin={{top:10,right:20,bottom:5,left:10}}>
          <CartesianGrid strokeDasharray="2 4" stroke="var(--border)" vertical={false} />
          <XAxis dataKey="date" tickFormatter={formatDate} tick={{fill:'var(--text-secondary)', fontSize:11, fontFamily:'var(--font-mono)'}} interval="preserveStartEnd" axisLine={{stroke:'var(--border-strong)'}} tickLine={{stroke:'var(--border-strong)'}} />
          <YAxis tick={{fill:'var(--text-secondary)', fontSize:11, fontFamily:'var(--font-mono)'}} width={50} axisLine={{stroke:'var(--border-strong)'}} tickLine={{stroke:'var(--border-strong)'}} />
          <Tooltip
            contentStyle={{background:'#fff',border:'1px solid var(--border-strong)',borderRadius:3,fontFamily:'var(--font-mono)',fontSize:12,boxShadow:'0 2px 8px rgba(10,48,82,0.12)'}}
            labelStyle={{color:'var(--text-secondary)',fontWeight:600}}
            itemStyle={{color:'var(--text-primary)'}}
          />
          {Object.keys(COUNTRY_META).map(c => (
            <Line key={c} type="monotone" dataKey={c}
                  stroke={COUNTRY_META[c].accent} strokeWidth={2} dot={false}
                  name={COUNTRY_META[c].name} connectNulls />
          ))}
          <Legend wrapperStyle={{fontFamily:'var(--font-sans)', fontSize:13}} />
        </LineChart>
      </ResponsiveContainer>
    </div>
  );
}

// --- Metric Card ---
function MetricCard({ label, value, unit, data, color, description, trend }) {
  const trendColor = trend > 0 ? 'var(--accent-green)' : trend < 0 ? 'var(--accent-red)' : 'var(--text-muted)';
  const trendArrow = trend > 0 ? '↑' : trend < 0 ? '↓' : '→';

  return (
    <div style={{
      background: 'var(--bg-card)',
      border: '1px solid var(--border)',
      borderTop: '3px solid ' + color,
      borderRadius: 'var(--radius)',
      padding: '16px 18px',
      display: 'flex',
      flexDirection: 'column',
      gap: 8,
      transition: 'box-shadow 0.2s, transform 0.2s',
      cursor: 'default',
    }}
    onMouseEnter={e => { e.currentTarget.style.boxShadow = '0 2px 12px rgba(10,48,82,0.10)'; }}
    onMouseLeave={e => { e.currentTarget.style.boxShadow = 'none'; }}
    >
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
        <div>
          <div style={{fontSize:12, color:'var(--text-secondary)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.6px'}}>{label}</div>
          <div style={{fontSize:28, fontFamily:'var(--font-mono)', fontWeight:600, marginTop:4, color: value !== null ? 'var(--text-primary)' : 'var(--text-muted)'}}>
            {value !== null ? `${value.toLocaleString(undefined, {maximumFractionDigits:1})}` : '—'}
            <span style={{fontSize:13, fontWeight:400, color:'var(--text-muted)', marginLeft:4}}>{unit}</span>
          </div>
        </div>
        <Sparkline data={data} color={color} />
      </div>
      {trend !== null && (
        <div style={{fontSize:12, fontFamily:'var(--font-mono)', color: trendColor, fontWeight:500}}>
          {trendArrow} {Math.abs(trend).toFixed(1)} vs prior
        </div>
      )}
      <div style={{fontSize:12, color:'var(--text-muted)', marginTop:2}}>{description}</div>
    </div>
  );
}

// --- Country Dashboard Panel ---
function CountryPanel({ country, fredData, wbData, loading }) {
  const meta = COUNTRY_META[country];
  if (loading) {
    return (
      <div style={{textAlign:'center', padding:'60px 0'}}>
        <div className="loading-pulse" style={{fontSize:18, color:'var(--text-secondary)'}}>Loading {meta.name} data...</div>
      </div>
    );
  }

  // Build metric cards from whatever data we have
  const cards = DASHBOARD_METRICS.map(m => {
    const fd = fredData[m.key] || [];
    const wb = wbData[m.key] || [];
    const data = fd.length > 0 ? fd : wb;
    const latest = data.length > 0 ? data[data.length - 1].value : null;
    const prev = data.length > 1 ? data[data.length - 2].value : null;
    const trend = (latest !== null && prev !== null) ? latest - prev : null;
    return (
      <MetricCard
        key={m.key}
        label={m.label}
        value={latest}
        unit={m.unit}
        data={data.slice(-36)}
        color={meta.accent}
        description={m.description}
        trend={trend}
      />
    );
  });

  return (
    <div>
      <div style={{display:'flex', alignItems:'center', gap:14, marginBottom:24, paddingBottom:14, borderBottom:'2px solid ' + meta.accent}}>
        <span style={{fontSize:36}}>{meta.flag}</span>
        <div>
          <h2 className="fred-title" style={{fontSize:28, margin:0, color: meta.accent}}>{meta.name}</h2>
          <span style={{fontSize:13, color:'var(--text-secondary)', textTransform:'uppercase', letterSpacing:'0.6px', fontWeight:500}}>Economic Dashboard</span>
        </div>
      </div>
      <div style={{
        display: 'grid',
        gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))',
        gap: 14,
      }}>
        {cards}
      </div>
    </div>
  );
}
